# Default data configuration for the Lentils dataset (cu3s + COCO).
# Used for standard training runs. The cu3s DataModule is provided by the
# cuvis-ai-dataloader plugin (extras [cu3s, coco]).

data_module: cu3s
splits:
  # Selectors over the cu3s measurement universe. val/test are disjoint so the default
  # leakage_check (error) passes; set leakage_check: warn for an overfit/sanity run.
  train:
    - {kind: file_indices, source: data/Lentils/Lentils_000.cu3s, ids: [0, 2, 3]}
  val:
    - {kind: file_indices, source: data/Lentils/Lentils_000.cu3s, ids: [1]}
  test:
    - {kind: file_indices, source: data/Lentils/Lentils_000.cu3s, ids: [5]}
batch_size: 2
params:
  cu3s_file_path: data/Lentils/Lentils_000.cu3s
  annotation_json_path: data/Lentils/Lentils_000.json
  processing_mode: Reflectance
