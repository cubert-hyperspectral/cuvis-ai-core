# Default data configuration for the Lentils dataset (cu3s + COCO).
# Used for standard training runs. The cu3s DataModule is provided by the
# cuvis-ai-dataloader plugin (extras [cu3s, coco]).

data_module: cu3s
splits:
  train_ids: [0, 2, 3]
  val_ids: [1, 5]
  test_ids: [1, 5]
batch_size: 2
params:
  cu3s_file_path: data/Lentils/Lentils_000.cu3s
  annotation_json_path: data/Lentils/Lentils_000.json
  processing_mode: Reflectance
